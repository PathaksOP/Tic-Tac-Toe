<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Tic-Tac-Toe</h1>
      <div class="win hidden"></div>
      <button class="newgame hidden">New Game</button>
    </header>

    <main>
      <div class="gamebox">
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <div class="line hidden" id="l1"></div>
        <div class="line hidden" id="l2"></div>
        <div class="line hidden" id="l3"></div>
        <div class="line hidden" id="l4"></div>
        <div class="line hidden" id="l5"></div>
        <div class="line hidden" id="l6"></div>
        <div class="line hidden" id="l7"></div>
        <div class="line hidden" id="l8"></div>
      </div>
    </main>

    <footer><button class="reset">Reset</button></footer>

    <script src="script.js"></script>
  </body>
</html>
